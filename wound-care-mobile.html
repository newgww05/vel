var CAT_ORDER = ['advanced','traditional','surgical-wound-care','personal','continence','diabetes'];
var activeCat = 'advanced';
var activeSearch = '';

function renderCatRail(){
  var rail = document.getElementById('catRail');
  rail.innerHTML = CAT_ORDER.map(function(c){
    var d = L3DATA[c];
    return '<div class="cat-chip' + (c===activeCat?' active':'') + '" onclick="selectCat(\'' + c + '\')">' + d.lbl + '</div>';
  }).join('');
}

function selectCat(c){
  activeCat = c;
  document.getElementById('searchInput').value = '';
  activeSearch = '';
  renderCatRail();
  renderList();
  window.scrollTo({top:0, behavior:'smooth'});
}

function onSearch(v){
  activeSearch = v.trim().toLowerCase();
  renderList();
}

function renderList(){
  var listArea = document.getElementById('listArea');

  if (activeSearch){
    var matches = [];
    for (var name in PRODS){
      if (name.toLowerCase().indexOf(activeSearch) !== -1) matches.push(name);
    }
    if (!matches.length){
      listArea.innerHTML = '<div class="empty-state">No products match &quot;' + activeSearch + '&quot;.<br>Try a different keyword or browse by category.</div>';
      return;
    }
    listArea.innerHTML = '<div class="cat-heading">' + matches.length + ' results</div><div class="card-list">' + matches.map(renderCard).join('') + '</div>';
    return;
  }

  var d = L3DATA[activeCat];
  var html = '<div class="cat-heading">' + d.ttl + '</div>';
  d.groups.forEach(function(grp){
    html += '<div class="grp-lbl">' + grp.g + '</div><div class="card-list">';
    html += grp.items.map(renderCard).join('');
    html += '</div>';
  });
  listArea.innerHTML = html;
}

function renderCard(name){
  var p = PRODS[name];
  if (!p) return '';
  var img = (p.imgs && p.imgs[0]) ? p.imgs[0].replace('#zoom','') : 'https://img.velcura.net/logogpt40.png';
  var tag = p.tagline || '';
  var pills = (p.indications || []).slice(0,2).map(function(i){ return '<span class="p-card-pill">' + i + '</span>'; }).join('');
  var esc = name.replace(/'/g,"\\'");
  return '<div class="p-card" onclick="goToDetail(\'' + esc + '\')">'
       + '<img class="p-card-img" src="' + img + '" alt="" loading="lazy">'
       + '<div class="p-card-body">'
       + '<p class="p-card-name">' + name + '</p>'
       + '<p class="p-card-tag">' + tag + '</p>'
       + '<div class="p-card-pills">' + pills + '</div>'
       + '</div></div>';
}

var carouselState = { imgs:[], idx:0 };
function renderCarousel(){
  var box = document.getElementById('detailCarousel');
  var c = carouselState;
  if (!c.imgs.length){ box.innerHTML = ''; return; }
  var url = c.imgs[c.idx].replace('#zoom','');
  var html = '<img src="' + url + '" alt="" loading="eager">';
  if (c.imgs.length > 1){
    html += '<button class="detail-arrow left" onclick="carouselState.idx=(carouselState.idx-1+carouselState.imgs.length)%carouselState.imgs.length;renderCarousel();">&#8249;</button>';
    html += '<button class="detail-arrow right" onclick="carouselState.idx=(carouselState.idx+1)%carouselState.imgs.length;renderCarousel();">&#8250;</button>';
    html += '<div class="detail-dots">';
    for (var i=0;i<c.imgs.length;i++){
      html += '<span class="detail-dot' + (i===c.idx?' active':'') + '"></span>';
    }
    html += '</div>';
  }
  box.innerHTML = html;
}

/* Reverse lookup: product name → category key, so "back" from a deep-linked
   product lands on that product's OWN category list, not an unrelated one */
var PROD_TO_CAT = {};
Object.keys(L3DATA).forEach(function(catKey){
  L3DATA[catKey].groups.forEach(function(grp){
    grp.items.forEach(function(item){ PROD_TO_CAT[item] = catKey; });
  });
});

function openDetailUI(name){
  var p = PRODS[name];
  if (!p) return;
  carouselState = { imgs: p.imgs || [], idx: 0 };
  renderCarousel();
  document.getElementById('detailTopTitle').textContent = name;
  document.getElementById('detailBadge').textContent = p.badge || '';
  document.getElementById('detailBadge').style.cssText = 'display:inline-block;padding:3px 12px;border-radius:999px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;' + (p.bs || '');
  document.getElementById('detailName').textContent = name;
  document.getElementById('detailTagline').textContent = p.tagline || '';
  document.getElementById('detailFeats').innerHTML = (p.features||[]).map(function(f){
    return '<div class="detail-feat"><div class="detail-feat-dot"></div><span>' + f + '</span></div>';
  }).join('');
  document.getElementById('detailIndications').innerHTML = (p.indications||[]).map(function(i){
    return '<span class="detail-ind-pill">' + i + '</span>';
  }).join('');
  document.getElementById('detailSpecs').innerHTML = (p.specs||[]).map(function(s){
    return '<tr><td class="sk">' + s[0] + '</td><td class="sv">' + s[1] + '</td></tr>';
  }).join('');
  document.getElementById('detailNote').textContent = p.note || '';
  document.getElementById('detailOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetailUI(){
  document.getElementById('detailOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

/* goToDetail: called when a product card is tapped. Pushes a history entry
   for the detail view, so the back button/gesture returns to THIS category's
   list first, rather than jumping back to whatever page linked here. */
function goToDetail(name){
  var cat = PROD_TO_CAT[name] || activeCat;
  if (cat !== activeCat){ activeCat = cat; renderCatRail(); renderList(); }
  history.pushState({view:'detail', prod:name, cat:cat}, '', 'wound-care-mobile.html?cat=' + cat + '&prod=' + encodeURIComponent(name));
  openDetailUI(name);
}

window.addEventListener('popstate', function(e){
  var st = e.state;
  if (st && st.view === 'detail') {
    if (st.cat && st.cat !== activeCat){ activeCat = st.cat; renderCatRail(); renderList(); }
    openDetailUI(st.prod);
  } else {
    closeDetailUI();
    if (st && st.cat) { activeCat = st.cat; renderCatRail(); renderList(); }
  }
});

/* Deep-link support: wound-care-mobile.html?cat=advanced or ?prod=Product+Name */
var deepLinkProd = null;
(function(){
  var params = new URLSearchParams(window.location.search);
  var cat = params.get('cat');
  var prod = params.get('prod');
  if (prod && PRODS[prod]) {
    deepLinkProd = prod;
    activeCat = PROD_TO_CAT[prod] || cat || activeCat;
  } else if (cat && L3DATA[cat]) {
    activeCat = cat;
  }
})();

renderCatRail();
renderList();

if (deepLinkProd) {
  /* Normalise current history entry to the LIST view (no ?prod=), then push
     a fresh entry for the detail view on top of it. First "back" from here
     lands on this category's product list, not the page that linked here. */
  history.replaceState({view:'list', cat:activeCat}, '', 'wound-care-mobile.html?cat=' + activeCat);
  history.pushState({view:'detail', prod:deepLinkProd, cat:activeCat}, '', 'wound-care-mobile.html?cat=' + activeCat + '&prod=' + encodeURIComponent(deepLinkProd));
  openDetailUI(deepLinkProd);
}
</script>
