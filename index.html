<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELCURA - Professional Wound Care Manufacturer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;300;400;500&family=Cormorant+Garamond:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sky-100: #e0f2fe;
    --sky-200: #bae6fd;
    --sky-500: #0ea5e9;
    --sky-600: #0284c7;
    --sky-700: #0369a1;
    --blue-700: #1d4ed8;
    --slate-400: #94a3b8;
    --slate-500: #64748b;
    --slate-600: #475569;
    --slate-700: #334155;
    --slate-800: #1e293b;
  }

  html, body {
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    background: #fff;
    color: var(--slate-800);
    overflow-x: hidden;
  }

  /* ── HERO ── */
  .hero {
    position: relative;
    height: 100vh;
    min-height: 700px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: linear-gradient(160deg, #fff 0%, #f0f9ff 50%, #fff 100%);
  }

  .hero-radial {
    position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 50%, rgba(14,165,233,0.10) 0%, transparent 65%);
    pointer-events: none;
  }

  .particles { position: absolute; inset: 0; pointer-events: none; }
  .particle {
    position: absolute; border-radius: 50%;
    background: rgba(125,211,252,0.55);
    animation: float-p linear infinite;
  }
  @keyframes float-p {
    0%   { transform: translateY(0) scale(1); opacity: 0; }
    20%  { opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(-60px) scale(0.6); opacity: 0; }
  }

  .orbit {
    position: absolute; border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .orbit-lg { width: 700px; height: 700px; border: 1px solid rgba(186,230,253,0.35); animation: spin 100s linear infinite; }
  .orbit-md { width: 560px; height: 560px; border: 1px solid rgba(186,230,253,0.20); }
  .orbit-sm { width: 440px; height: 440px; border: 1px solid rgba(186,230,253,0.15); }
  @keyframes spin {
    from { transform: translate(-50%,-50%) rotate(0deg); }
    to   { transform: translate(-50%,-50%) rotate(360deg); }
  }

  /* ── NAV ── */
  .nav {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 22px 48px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 100;
  }
  .nav-brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 300;
    letter-spacing: 0.18em; color: var(--slate-800);
    text-decoration: none;
  }
  .nav-links { display: flex; gap: 32px; list-style: none; }
  .nav-links a {
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--slate-500); text-decoration: none; transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--sky-600); }
  .nav-cta {
    padding: 8px 20px;
    border: 1px solid var(--sky-200); border-radius: 999px;
    font-size: 11px; letter-spacing: 0.10em; text-transform: uppercase;
    color: var(--sky-600); background: transparent; cursor: pointer;
    transition: background 0.2s, color 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .nav-cta:hover { background: var(--sky-600); color: #fff; }

  /* ── SCENE ── */
  .scene {
    position: relative;
    width: 700px; height: 700px;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── CATEGORY NODES ── */
  .cat-node {
    position: absolute;
    width: 148px; height: 148px; border-radius: 50%;
    background: rgba(255,255,255,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(186,230,253,0.70);
    box-shadow: 0 0 32px rgba(125,211,252,0.25), 0 4px 20px rgba(14,165,233,0.09);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer; top: 50%; left: 50%;
    transition: box-shadow 0.3s ease;
  }
  .cat-node:hover {
    animation: jiggle 0.4s ease;
    box-shadow: 0 0 42px rgba(125,211,252,0.42), 0 6px 28px rgba(14,165,233,0.15);
  }
  @keyframes jiggle {
    0%   { transform: translate(var(--nx), var(--ny)) translate(-50%,-50%) rotate(0deg); }
    20%  { transform: translate(var(--nx), var(--ny)) translate(-50%,-50%) rotate(-1.5deg) scale(1.025); }
    40%  { transform: translate(var(--nx), var(--ny)) translate(-50%,-50%) rotate(1.5deg) scale(1.03); }
    60%  { transform: translate(var(--nx), var(--ny)) translate(-50%,-50%) rotate(-1deg) scale(1.02); }
    80%  { transform: translate(var(--nx), var(--ny)) translate(-50%,-50%) rotate(0.8deg) scale(1.01); }
    100% { transform: translate(var(--nx), var(--ny)) translate(-50%,-50%) rotate(0deg) scale(1); }
  }
  .cat-inner-ring {
    position: absolute; inset: 6px; border-radius: 50%;
    border: 1px solid rgba(186,230,253,0.50); pointer-events: none;
  }
  .cat-id {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px; font-weight: 300;
    color: var(--sky-600); line-height: 1; margin-bottom: 5px;
  }
  .cat-name {
    font-size: 13px; font-weight: 400;
    color: var(--sky-700); text-align: center;
    letter-spacing: 0.03em; line-height: 1.3; padding: 0 10px;
  }

  /* submenu */
  .cat-submenu {
    position: absolute;
    left: calc(100% + 14px); top: 50%;
    transform: translateY(-50%) translateX(10px);
    background: rgba(255,255,255,0.97);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(186,230,253,0.60);
    border-radius: 18px;
    box-shadow: 0 16px 50px rgba(14,165,233,0.12);
    min-width: 210px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s, transform 0.25s;
    z-index: 50;
  }
  .cat-node:hover .cat-submenu {
    opacity: 1; pointer-events: auto;
    transform: translateY(-50%) translateX(0);
  }
  .submenu-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 13px 18px;
    border-bottom: 1px solid rgba(226,232,240,0.60);
    cursor: pointer; font-size: 13px; color: var(--blue-700);
    transition: background 0.2s, padding-left 0.2s;
  }
  .submenu-item:first-child { border-radius: 18px 18px 0 0; }
  .submenu-item:last-child  { border-bottom: none; border-radius: 0 0 18px 18px; }
  .submenu-item:hover { background: rgba(240,249,255,0.8); padding-left: 22px; }
  .submenu-arrow { color: var(--sky-500); }

  /* ── CENTER ── */
  .center {
    position: relative; z-index: 20;
    width: 300px; height: 300px; border-radius: 50%;
    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 20px 100px rgba(14,165,233,0.16), 0 0 50px rgba(125,211,252,0.14);
    border: 1px solid rgba(186,230,253,0.55);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 24px;
    animation: pulse-c 7s ease-in-out infinite;
  }
  @keyframes pulse-c {
    0%,100% { box-shadow: 0 20px 100px rgba(14,165,233,0.16), 0 0 50px rgba(125,211,252,0.14); }
    50%     { box-shadow: 0 24px 120px rgba(14,165,233,0.24), 0 0 70px rgba(125,211,252,0.26); }
  }
  .center-ping {
    position: absolute; inset: 0; border-radius: 50%;
    border: 1px solid rgba(125,211,252,0.28);
    animation: ping 4s cubic-bezier(0,0,.2,1) infinite;
    pointer-events: none;
  }
  @keyframes ping {
    0%   { transform: scale(1); opacity: 0.5; }
    70%  { transform: scale(1.16); opacity: 0; }
    100% { transform: scale(1.16); opacity: 0; }
  }
  .center-logo {
    width: 80px; height: 80px; object-fit: contain; margin-bottom: 14px;
    filter: drop-shadow(0 0 16px rgba(14,165,233,0.22));
  }
  .center-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 34px; font-weight: 300;
    letter-spacing: 0.14em; color: var(--slate-800);
    line-height: 1; margin-bottom: 10px;
  }
  .center-tagline {
    font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--slate-400); line-height: 2;
  }

  .scroll-hint {
    position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
    font-size: 9px; letter-spacing: 0.35em; text-transform: uppercase;
    color: var(--sky-400); animation: bounce 2s ease-in-out infinite;
  }
  @keyframes bounce {
    0%,100% { transform: translateX(-50%) translateY(0); }
    50%     { transform: translateX(-50%) translateY(6px); }
  }

  /* ── STATS ── */
  .stats {
    position: relative; padding: 80px 40px;
    background: linear-gradient(180deg, #f8fafc 0%, #fff 100%); overflow: hidden;
  }
  .stats-bg {
    position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 50%, rgba(14,165,233,0.05) 0%, transparent 70%);
    pointer-events: none;
  }
  .stats-card {
    max-width: 960px; margin: 0 auto;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(186,230,253,0.50); border-radius: 36px;
    box-shadow: 0 16px 72px rgba(14,165,233,0.07);
    padding: 48px 40px;
    display: grid; grid-template-columns: repeat(5, 1fr);
    gap: 0; text-align: center;
  }
  .stat-item {
    padding: 0 16px;
    border-right: 1px solid rgba(186,230,253,0.40);
  }
  .stat-item:last-child { border-right: none; }
  .stat-icon { font-size: 26px; margin-bottom: 14px; color: var(--sky-500); }
  .stat-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px; font-weight: 300; color: var(--blue-700);
    margin-bottom: 8px; line-height: 1;
  }
  .stat-label { font-size: 11px; color: var(--slate-500); letter-spacing: 0.05em; line-height: 1.6; }

  /* ── FOOTER ── */
  .footer {
    background: linear-gradient(180deg, #f0f9ff 0%, #e0f2fe 100%);
    border-top: 1px solid rgba(186,230,253,0.60);
    padding: 72px 48px 56px;
  }
  .footer-inner {
    max-width: 960px; margin: 0 auto;
    display: flex; flex-direction: column; align-items: center;
  }
  .footer-brand {
    display: flex; flex-direction: column; align-items: center; margin-bottom: 40px;
  }
  .footer-logo {
    width: 64px; height: 64px; object-fit: contain;
    margin-bottom: 14px; opacity: 0.9;
  }
  .footer-company {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px; font-weight: 300; letter-spacing: 0.18em;
    color: var(--slate-700);
  }
  .footer-contacts {
    display: flex; align-items: center; gap: 32px; margin-bottom: 40px;
  }
  .footer-contact-item {
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; color: var(--slate-600); text-decoration: none;
    transition: color 0.2s;
  }
  .footer-contact-item:hover { color: var(--sky-600); }
  .footer-contact-icon {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; flex-shrink: 0;
    border: 1px solid rgba(186,230,253,0.70);
    background: rgba(255,255,255,0.80);
    transition: background 0.2s, border-color 0.2s;
  }
  .footer-contact-item:hover .footer-contact-icon {
    background: #fff;
    border-color: rgba(14,165,233,0.40);
  }
  .wa-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 24px; border-radius: 999px;
    background: #25d366; color: #fff;
    font-size: 13px; font-weight: 400; letter-spacing: 0.04em;
    text-decoration: none; border: none; cursor: pointer;
    transition: background 0.2s, transform 0.2s;
    box-shadow: 0 6px 24px rgba(37,211,102,0.28);
    font-family: 'DM Sans', sans-serif;
  }
  .wa-btn:hover { background: #1fb857; transform: scale(1.04); }
  .wa-icon { display: flex; align-items: center; }
  .footer-divider {
    width: 100%; max-width: 480px;
    border: none; border-top: 1px solid rgba(186,230,253,0.50);
    margin-bottom: 28px;
  }
  .footer-copy {
    font-size: 11px; color: var(--slate-400);
    letter-spacing: 0.08em; text-align: center;
  }
</style>
</head>
<body>

<!-- HERO -->
<section class="hero">
  <nav class="nav">
    <a class="nav-brand" href="#">VELCURA</a>
    <ul class="nav-links">
      <li><a href="#">产品</a></li>
      <li><a href="#">关于我们</a></li>
      <li><a href="#">认证资质</a></li>
      <li><a href="#">联系我们</a></li>
    </ul>
    <button class="nav-cta">获取报价</button>
  </nav>

  <div class="hero-radial"></div>
  <div class="particles" id="particles"></div>

  <div class="orbit orbit-lg"></div>

  <div class="orbit orbit-sm"></div>

  <div class="scene" id="scene">
    <div class="center">
      <div class="center-ping"></div>

    </div>
  </div>

  <div class="scroll-hint">Scroll ↓</div>
</section>

<!-- STATS -->
<section class="stats">
  <div class="stats-bg"></div>
  <div class="stats-card">
    <div class="stat-item">
      <div class="stat-icon">🏭</div>
      <div class="stat-value">20,000+</div>

    <div class="stat-item">
      <div class="stat-icon">✅</div>
      <div class="stat-value">CE / FDA</div>
      <div class="stat-label">国际双重<br>认证资质</div>
    </div>
    <div class="stat-item">
      <div class="stat-icon">🔬</div>
      <div class="stat-value">100+</div>
      <div class="stat-label">研发专业<br>技术人员</div>
    </div>
    <div class="stat-item">
      <div class="stat-icon">🌍</div>
      <div class="stat-value">100+</div>
      <div class="stat-label">覆盖国家<br>与地区</div>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-inner">

    <div class="footer-brand">
      <img class="footer-logo" src="https://img.velcura.net/vel-logo1.png" alt="Velcura Medical">
      <div class="footer-company">Velcura Medical</div>
    </div>

    <div class="footer-contacts">
      <a class="wa-btn" href="https://wa.me/" target="_blank">
        <span class="wa-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
          </svg>
        </span>
        WhatsApp
      </a>

      <a class="footer-contact-item" href="mailto:info@velcura.net">
        <div class="footer-contact-icon">✉️</div>
        info@velcura.net
      </a>
    </div>

    <hr class="footer-divider">
    <div class="footer-copy">© 2025 Velcura Medical. All rights reserved.</div>

  </div>
</footer>

<script>
  // Particles
  const pc = document.getElementById('particles');
  for (let i = 0; i < 28; i++) {
    const d = document.createElement('div');
    d.className = 'particle';
    const s = Math.random() * 5 + 2;
    d.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${Math.random()*8+5}s;animation-delay:${Math.random()*6}s;opacity:${Math.random()*0.5+0.1};`;
    pc.appendChild(d);
  }

  // Category nodes
  const cats = [
    { id: '01', name: '创伤护理',   angle: 0,   subs: ['高级伤口敷料', '传统伤口敷料'] },
    { id: '02', name: '个人护理',   angle: 60,  subs: [] },
    { id: '03', name: '尿失禁护理', angle: 120, subs: [] },
    { id: '04', name: '糖尿病护理', angle: 180, subs: [] },
    { id: '05', name: '门诊护理',   angle: 240, subs: [] },
    { id: '06', name: '预防与保护', angle: 300, subs: [] },
  ];

  const scene = document.getElementById('scene');
  const R = 258;

  cats.forEach(cat => {
    const rad = (cat.angle - 90) * Math.PI / 180;
    const nx = Math.cos(rad) * R;
    const ny = Math.sin(rad) * R;

    const node = document.createElement('div');
    node.className = 'cat-node';
    node.style.cssText = `--nx:${nx}px;--ny:${ny}px;transform:translate(${nx}px,${ny}px) translate(-50%,-50%);`;

    const subs = cat.subs.map(s =>
      `<div class="submenu-item"><span>${s}</span><span class="submenu-arrow">→</span></div>`
    ).join('');

    node.innerHTML = `
      <div class="cat-inner-ring"></div>
      <div class="cat-id">${cat.id}</div>
      <div class="cat-name">${cat.name}</div>
      ${subs.length ? `<div class="cat-submenu">${subs}</div>` : ''}
    `;
    scene.appendChild(node);
  });
</script>
</body>
</html>
